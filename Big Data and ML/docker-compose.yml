services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/datalake || true;
      exit 0;
      "

  jupyterhub:
    image: jupyterhub/jupyterhub:latest
    container_name: jupyterhub
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      JUPYTER_PASSWORD: ${JUPYTER_PASSWORD}

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: datalake
    ports:
      - "8000:8000"
    volumes:
      - ./notebooks:/home/student/work
      - ./scripts:/home/student/scripts
    command: >
      bash -c "
      pip install --no-cache-dir
      jupyterlab
      notebook
      jupyterhub-dummyauthenticator
      pandas
      sqlalchemy
      psycopg2-binary
      boto3
      s3fs
      pyarrow
      scikit-learn
      matplotlib
      &&
      useradd -m -s /bin/bash student || true
      &&
      mkdir -p /home/student/work
      &&
      chown -R student:student /home/student
      &&
      jupyterhub
      --ip=0.0.0.0
      --port=8000
      --JupyterHub.authenticator_class=dummyauthenticator.DummyAuthenticator
      --DummyAuthenticator.password=$$JUPYTER_PASSWORD
      --Authenticator.allow_all=True
      --Spawner.cmd=/srv/venv/bin/jupyterhub-singleuser
      --Spawner.default_url=/lab
      --Spawner.notebook_dir=/home/student/work
      --Spawner.env_keep=POSTGRES_HOST
      --Spawner.env_keep=POSTGRES_PORT
      --Spawner.env_keep=POSTGRES_USER
      --Spawner.env_keep=POSTGRES_PASSWORD
      --Spawner.env_keep=POSTGRES_DB
      --Spawner.env_keep=MINIO_ENDPOINT
      --Spawner.env_keep=MINIO_ROOT_USER
      --Spawner.env_keep=MINIO_ROOT_PASSWORD
      --Spawner.env_keep=MINIO_BUCKET
      "

  superset:
    build:
      context: ./superset
    image: hse-superset:latest
    container_name: superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: "no"

      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    command: >
      bash -c "
      superset db upgrade
      &&
      superset fab create-admin
      --username $$SUPERSET_ADMIN_USERNAME
      --firstname $$SUPERSET_ADMIN_FIRSTNAME
      --lastname $$SUPERSET_ADMIN_LASTNAME
      --email $$SUPERSET_ADMIN_EMAIL
      --password $$SUPERSET_ADMIN_PASSWORD
      || true
      &&
      superset init
      &&
      superset run -h 0.0.0.0 -p 8088
      "

volumes:
  postgres_data:
  minio_data:
  superset_home: